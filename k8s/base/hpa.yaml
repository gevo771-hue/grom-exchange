apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grom-backend
  namespace: grom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grom-backend
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    - type: Pods
      pods:
        metric:
          name: grom_http_requests_per_second
        target:
          type: AverageValue
          averageValue: "500"
