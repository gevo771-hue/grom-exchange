server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/css application/javascript application/json text/plain;

    # Serve pre-compressed .gz twins from the build (zero CPU per request).
    # scripts/build-frontend.mjs emits them for every .html/.js/.css in dist.
    gzip_static on;

    # .well-known files (WalletConnect domain verification, future ACME, etc.)
    # Must NOT fall through to /index.html — return 404 if the actual file is missing.
    location /.well-known/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # Static assets must never fall through to SPA index.html
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # index.html: browsers always revalidate (max-age=0) but Cloudflare may
    # hold it 60s on the edge (s-maxage) — /: p95 1016ms → target <300ms at
    # 50 rps (night1 finding: every request was hitting origin as DYNAMIC).
    # New deploys reach all users within 60s; JS/CSS stay hash-busted forever.
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=0, s-maxage=60, must-revalidate";
    }

    # Version beacon for stale-tab self-reload — must never be cached.
    location = /version.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Content-hashed assets (grom-wallet.a7b3c9d1.js …) produced by
    # scripts/build-frontend.mjs. Name changes with content — cache forever.
    location ~ "^/[\w-]+\.[a-f0-9]{8}\.(js|css)$" {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Un-hashed top-level JS/CSS — dev fallback + old cached HTML still
    # referencing ?v= names. Force revalidation so these never go stale.
    location ~ ^/grom-[a-z-]+\.(js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

  location ~ ^/r/([A-Za-z0-9]+)/?$ {
        return 302 /?ref=$1#landing;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://backend:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://backend:4000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
