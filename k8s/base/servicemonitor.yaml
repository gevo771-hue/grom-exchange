apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grom-backend
  namespace: grom
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grom-backend
  namespaceSelector:
    matchNames:
      - grom
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
      scrapeTimeout: 10s
      honorLabels: true
